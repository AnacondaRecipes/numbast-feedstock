{% set number = 0 %}
{% set name = "numbast" %}
{% set version = "0.10.0" %}
{% set sha256 = "ad3146c05514f09796aae80f579a03efc7c20380c35f4bc2d4c9b5cdc8dc5f43" %}

package:
  name: {{ name|lower }}-split
  version: {{ version }}

source:
  url: https://github.com/NVIDIA/numbast/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: {{ number }}
  skip: true  # [win or osx]

outputs:
  - name: ast_canopy
    version: {{ version }}
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - {{ stdlib('c') }}
        - cmake >=3.29
        - ninja
      host:
        - python
        - pip
        - pybind11
        - setuptools_scm
        - scikit-build-core
        - clangdev >=18,<22
        - llvmdev >=14
        - llvm >=14
      run:
        - python
        - cuda-version >=12.5,<14
        - cuda-nvcc
        - clangdev >=18,<22
        # Needed by clang CUDA wrappers at runtime.
        - libcurand-dev
        - cuda-pathfinder
    build:
      number: {{ number }}
      skip: true  # [win or osx]
      script: bash {{ RECIPE_DIR }}/build-astcanopy.sh
    test:
      imports:
        - ast_canopy
      files:
        - lib/libastcanopy.so
    about:
      home: https://github.com/NVIDIA/numbast
      summary: CUDA C++ device-function header parser used by Numbast
      license: Apache-2.0
      license_file: LICENSE

  - name: numbast
    build:
      number: {{ number }}
      skip: true  # [win or osx]
      script: bash {{ RECIPE_DIR }}/build-numbast.sh
    requirements:
      host:
        - python
        - pip
        - setuptools
        - setuptools_scm
        - ast_canopy >=0.5.0
      run:
        - python
        - ast_canopy >=0.5.0
        - cuda-version >=12.5,<14
        - cuda-nvrtc
        - numba-cuda >=0.25.0
        - pyyaml
        - click
        - jinja2
    test:
      imports:
        - numbast
      commands:
        - python -m numbast --help
    about:
      home: https://github.com/NVIDIA/numbast
      summary: CUDA C++ to numba.cuda binding generator
      license: Apache-2.0
      license_file: LICENSE

about:
  home: https://github.com/NVIDIA/numbast
  summary: CUDA C++ to numba.cuda binding generator
  license: Apache-2.0
  license_file: LICENSE

extra:
  feedstock-name: numbast
  recipe-maintainers:
    - cryos
    - isvoid
    - conda-forge/cuda-python
